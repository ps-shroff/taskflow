<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Team Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #111318;
    --surface2: #1a1d25;
    --surface3: #222633;
    --border: #2a2e3d;
    --border2: #363b4e;
    --text: #e8eaf0;
    --text2: #8b90a4;
    --text3: #555c75;
    --accent: #6c7fff;
    --accent2: #4d5ffa;
    --accent-glow: rgba(108,127,255,0.15);
    --green: #3dd68c;
    --yellow: #f5c842;
    --red: #f05050;
    --orange: #f0834e;
    --radius: 10px;
    --radius-lg: 16px;
    --font: 'DM Sans', sans-serif;
    --font-heading: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }

  /* ── LAYOUT ── */
  #app { height: 100%; display: flex; flex-direction: column; }
  .shell { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 240px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 0; overflow-y: auto;
  }
  .main { flex: 1; overflow-y: auto; padding: 32px; }

  /* ── AUTH ── */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 40px; width: 400px; max-width: 95vw;
  }
  .auth-logo { font-family: var(--font-heading); font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .auth-tagline { color: var(--text2); font-size: 13px; margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; text-align: center; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 500; color: var(--text2); transition: all .2s; }
  .auth-tab.active { background: var(--accent); color: #fff; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); padding: 10px 12px;
    font-family: var(--font); font-size: 14px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group select option { background: var(--surface2); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px;
    border: none; border-radius: var(--radius); font-family: var(--font); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all .2s; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(240,80,80,.15); color: var(--red); border: 1px solid rgba(240,80,80,.3); }
  .btn-danger:hover { background: rgba(240,80,80,.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  /* ── SIDEBAR ── */
  .sidebar-logo {
    padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
    font-family: var(--font-heading); font-weight: 800; font-size: 20px; color: var(--accent);
  }
  .sidebar-logo span { color: var(--text3); font-weight: 400; font-size: 12px; display: block; margin-top: 2px; font-family: var(--font); }
  .sidebar-section { padding: 12px 12px 4px; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px; margin: 2px 8px;
    border-radius: 8px; cursor: pointer; color: var(--text2); font-weight: 500;
    transition: all .15s; font-size: 13px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent); }
  .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
  .user-chip { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading); font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-name { font-weight: 600; font-size: 13px; }
  .user-role { font-size: 11px; color: var(--text3); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-admin { background: rgba(108,127,255,.2); color: var(--accent); }
  .badge-member { background: rgba(139,144,164,.15); color: var(--text2); }

  /* ── PAGE HEADER ── */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-family: var(--font-heading); font-size: 24px; font-weight: 700; }
  .page-sub { color: var(--text2); font-size: 13px; margin-top: 2px; }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px; position: relative; overflow: hidden;
  }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.blue::before { background: var(--accent); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.yellow::before { background: var(--yellow); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.orange::before { background: var(--orange); }
  .stat-val { font-family: var(--font-heading); font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-label { color: var(--text2); font-size: 12px; margin-top: 6px; font-weight: 500; }
  .stat-icon { position: absolute; top: 16px; right: 16px; font-size: 22px; opacity: .3; }

  /* ── CARDS / GRID ── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px;
  }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; gap: 12px;
  }
  .project-card:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--surface2); }
  .project-card-name { font-family: var(--font-heading); font-size: 16px; font-weight: 700; }
  .project-card-desc { color: var(--text2); font-size: 13px; flex: 1; }
  .project-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .meta-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface2); color: var(--text2); }
  .progress-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }

  /* ── TASK TABLE / KANBAN ── */
  .view-toggle { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 3px; }
  .view-btn { padding: 5px 12px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 12px; font-weight: 600; transition: all .2s; }
  .view-btn.active { background: var(--surface); color: var(--text); }

  .task-table { width: 100%; border-collapse: collapse; }
  .task-table th { text-align: left; padding: 10px 12px; color: var(--text3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
  .task-table td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table tr:hover td { background: var(--surface2); }
  .task-title-cell { font-weight: 500; max-width: 260px; }
  .task-title-cell small { color: var(--text2); font-weight: 400; font-size: 12px; display: block; }

  /* STATUS & PRIORITY BADGES */
  .status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .status-TODO { background: rgba(139,144,164,.15); color: var(--text2); }
  .status-IN_PROGRESS { background: rgba(108,127,255,.15); color: var(--accent); }
  .status-DONE { background: rgba(61,214,140,.15); color: var(--green); }
  .priority { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .priority-LOW { background: rgba(61,214,140,.1); color: var(--green); }
  .priority-MEDIUM { background: rgba(245,200,66,.1); color: var(--yellow); }
  .priority-HIGH { background: rgba(240,80,80,.1); color: var(--red); }
  .overdue-badge { background: rgba(240,83,78,.15); color: var(--red); font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }

  /* KANBAN */
  .kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
  .kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .kanban-col-header { padding: 14px 16px; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .kanban-col-header .count { background: var(--surface2); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: var(--text2); }
  .kanban-tasks { padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
  .kanban-task {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; cursor: pointer; transition: all .2s;
  }
  .kanban-task:hover { border-color: var(--border2); transform: translateY(-1px); }
  .kanban-task-title { font-weight: 600; font-size: 13px; margin-bottom: 8px; }
  .kanban-task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .assignee-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
  .mini-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    width: 500px; max-width: 100%; max-height: 90vh; overflow-y: auto;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--font-heading); font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px 24px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 8px; }

  /* ── MEMBERS LIST ── */
  .member-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: none; }
  .member-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 700; font-size: 14px; color: #fff; }
  .member-info { flex: 1; }
  .member-name { font-weight: 600; }
  .member-email { color: var(--text2); font-size: 12px; }

  /* ── FILTERS ── */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .filter-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 7px 10px; font-family: var(--font); font-size: 13px; cursor: pointer; outline: none; }

  /* ── TOAST ── */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; min-width: 280px; font-size: 13px; animation: slideIn .25s ease;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.success { border-color: rgba(61,214,140,.4); }
  .toast.error { border-color: rgba(240,80,80,.4); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
  .empty h3 { font-family: var(--font-heading); font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* ── DIVIDER / MISC ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .section-title { font-family: var(--font-heading); font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .ml-auto { margin-left: auto; }
  .mt-2 { margin-top: 8px; }
  .text-muted { color: var(--text2); }
  .text-sm { font-size: 12px; }
  .text-danger { color: var(--red); }
  .hidden { display: none !important; }
  .loading { text-align: center; padding: 40px; color: var(--text2); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .sidebar { width: 200px; }
    .main { padding: 20px; }
    .kanban-board { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .shell { flex-direction: column; }
    .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">⚡ TaskFlow</div>
      <div class="auth-tagline">Team Task Manager — collaborate, assign, ship</div>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
        <div class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div>
      </div>

      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">Login</button>
      </div>

      <div id="signup-form" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password (min 6 chars)</label>
          <input type="password" id="signup-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary btn-full" onclick="signup()">Create Account</button>
        <p class="text-muted text-sm mt-2">💡 First user automatically becomes Admin</p>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="shell hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">⚡ TaskFlow <span id="sidebar-user-role"></span></div>
      <div class="sidebar-section">Navigation</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="icon">📊</span> Dashboard
      </div>
      <div class="nav-item" onclick="navigate('projects')" id="nav-projects">
        <span class="icon">📁</span> Projects
      </div>
      <div class="nav-item" onclick="navigate('my-tasks')" id="nav-my-tasks">
        <span class="icon">✅</span> My Tasks
      </div>
      <div class="nav-item hidden" onclick="navigate('admin')" id="nav-admin">
        <span class="icon">🛡️</span> Admin
      </div>
      <div class="sidebar-bottom">
        <div class="user-chip">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div>
            <div class="user-name" id="sidebar-name"></div>
            <div class="user-role" id="sidebar-role-label"></div>
          </div>
          <button class="btn btn-ghost btn-sm ml-auto" onclick="logout()" title="Logout">↩</button>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main" id="main-content"></main>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  user: null,
  token: null,
  currentPage: 'dashboard',
  currentProject: null,
  users: [],
  taskView: 'table'
};

// ═══════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════
const BASE = '/api';

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (state.token) opts.headers['Authorization'] = `Bearer ${state.token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

const get = (p) => api('GET', p);
const post = (p, b) => api('POST', p, b);
const put = (p, b) => api('PUT', p, b);
const del = (p) => api('DELETE', p);

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((el, i) => el.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return toast('Fill in all fields', 'error');
  try {
    const data = await post('/auth/login', { email, password });
    setSession(data);
  } catch (e) { toast(e.message, 'error'); }
}

async function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) return toast('Fill in all fields', 'error');
  try {
    const data = await post('/auth/signup', { name, email, password });
    setSession(data);
  } catch (e) { toast(e.message, 'error'); }
}

function setSession({ user, token }) {
  state.user = user;
  state.token = token;
  localStorage.setItem('tf_token', token);
  localStorage.setItem('tf_user', JSON.stringify(user));
  showApp();
}

function logout() {
  state.user = null; state.token = null;
  localStorage.removeItem('tf_token');
  localStorage.removeItem('tf_user');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-shell').classList.add('hidden');
}

async function init() {
  const token = localStorage.getItem('tf_token');
  const user = localStorage.getItem('tf_user');
  if (token && user) {
    state.token = token;
    state.user = JSON.parse(user);
    try {
      const data = await get('/auth/me');
      state.user = data.user;
      showApp();
    } catch { logout(); }
  }
}

function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  // Sidebar
  document.getElementById('sidebar-name').textContent = state.user.name;
  document.getElementById('sidebar-role-label').textContent = state.user.role;
  document.getElementById('sidebar-avatar').textContent = state.user.name.charAt(0).toUpperCase();
  document.getElementById('sidebar-user-role').textContent = state.user.role === 'ADMIN' ? '⚡ Admin' : '';
  if (state.user.role === 'ADMIN') document.getElementById('nav-admin').classList.remove('hidden');
  // Load users for dropdowns
  get('/users').then(u => state.users = u).catch(() => {});
  navigate('dashboard');
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(page, data) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${page.split('-')[0]}`);
  if (navEl) navEl.classList.add('active');

  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'projects': renderProjects(); break;
    case 'project': renderProject(data); break;
    case 'my-tasks': renderMyTasks(); break;
    case 'admin': renderAdmin(); break;
  }
}

function setTaskView(v) {
  state.taskView = v;
  if (state.currentProject) {
    const p = state.currentProject;
    const myMembership = p.members.find(m => m.userId === state.user.id);
    const isAdmin = state.user.role === 'ADMIN' || p.ownerId === state.user.id || myMembership?.role === 'ADMIN';
    document.querySelectorAll('.view-btn').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.view-btn').forEach(el => { if(el.textContent.toLowerCase().includes(v==='table'?'table':'kanban')) el.classList.add('active'); });
    renderTasksView(p.tasks, isAdmin);
  }
}

function filterTasks() {
  if (!state.currentProject) return;
  const status = document.getElementById('filter-status')?.value;
  const priority = document.getElementById('filter-priority')?.value;
  const assignee = document.getElementById('filter-assignee')?.value;
  const p = state.currentProject;
  const myMembership = p.members.find(m => m.userId === state.user.id);
  const isAdmin = state.user.role === 'ADMIN' || p.ownerId === state.user.id || myMembership?.role === 'ADMIN';
  let tasks = p.tasks;
  if (status) tasks = tasks.filter(t => t.status === status);
  if (priority) tasks = tasks.filter(t => t.priority === priority);
  if (assignee) tasks = tasks.filter(t => t.assigneeId === parseInt(assignee));
  renderTasksView(tasks, isAdmin);
}

function renderTasksView(tasks, isAdmin) {
  const container = document.getElementById('tasks-view');
  if (!container) return;

  if (state.taskView === 'kanban') {
    const cols = { TODO: [], IN_PROGRESS: [], DONE: [] };
    tasks.forEach(t => cols[t.status] ? cols[t.status].push(t) : cols['TODO'].push(t));
    container.innerHTML = `
      <div class="kanban-board">
        ${[['TODO','📋 To Do','var(--text2)'],['IN_PROGRESS','🔄 In Progress','var(--accent)'],['DONE','✅ Done','var(--green)']].map(([status,label,color]) => `
          <div class="kanban-col">
            <div class="kanban-col-header" style="color:${color}">
              ${label} <span class="count">${cols[status].length}</span>
            </div>
            <div class="kanban-tasks">
              ${cols[status].length ? cols[status].map(t => `
                <div class="kanban-task" onclick="openTaskDetail(${t.id})">
                  <div class="kanban-task-title">${esc(t.title)}</div>
                  <div class="kanban-task-meta">
                    <span class="priority priority-${t.priority}">${t.priority}</span>
                    ${t.assignee ? `<span class="assignee-chip"><span class="mini-avatar">${t.assignee.name.charAt(0)}</span>${esc(t.assignee.name)}</span>` : ''}
                    ${t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'DONE' ? '<span class="overdue-badge">Overdue</span>' : ''}
                  </div>
                </div>
              `).join('') : '<div class="text-muted text-sm" style="text-align:center;padding:20px">Empty</div>'}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    if (!tasks.length) { container.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><h3>No tasks yet</h3><p>Create your first task</p></div>`; return; }
    container.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden">
        <table class="task-table">
          <thead><tr>
            <th>Task</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due</th><th></th>
          </tr></thead>
          <tbody>
            ${tasks.map(t => {
              const overdue = t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'DONE';
              return `
              <tr>
                <td class="task-title-cell" onclick="openTaskDetail(${t.id})" style="cursor:pointer">
                  ${esc(t.title)}
                  ${t.description ? `<small>${esc(t.description.slice(0,60))}${t.description.length>60?'…':''}</small>` : ''}
                </td>
                <td>
                  <select class="filter-select" style="padding:4px 8px" onchange="quickUpdateStatus(${t.id},this.value)">
                    <option ${t.status==='TODO'?'selected':''} value="TODO">To Do</option>
                    <option ${t.status==='IN_PROGRESS'?'selected':''} value="IN_PROGRESS">In Progress</option>
                    <option ${t.status==='DONE'?'selected':''} value="DONE">Done</option>
                  </select>
                </td>
                <td><span class="priority priority-${t.priority}">${t.priority}</span></td>
                <td>${t.assignee ? `<span class="assignee-chip"><span class="mini-avatar">${t.assignee.name.charAt(0)}</span>${esc(t.assignee.name)}</span>` : '<span class="text-muted">—</span>'}</td>
                <td>${t.dueDate ? `<span ${overdue?'class="text-danger"':'class="text-muted"'}>${new Date(t.dueDate).toLocaleDateString()}</span>` : '<span class="text-muted">—</span>'}</td>
                <td>
                  ${isAdmin || t.creatorId === state.user.id ? `<button class="btn btn-ghost btn-sm" onclick="openEditTask(${t.id})">✏️</button>` : ''}
                  ${isAdmin || t.creatorId === state.user.id ? `<button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">🗑</button>` : ''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }
}

async function quickUpdateStatus(taskId, status) {
  try {
    await put(`/tasks/${taskId}`, { status });
    if (state.currentProject) {
      const task = state.currentProject.tasks.find(t => t.id === taskId);
      if (task) task.status = status;
    }
    toast('Status updated', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

        <div><span class="text-muted">Creator</span><br>${esc(t.creator?.name)}</div>
        <div><span class="text-muted">Project</span><br>${esc(t.project?.name)}</div>
      </div>
      ${canEdit ? `
        <hr class="divider">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>Update Status</label>
            <select id="d-status">
              <option ${t.status==='TODO'?'selected':''} value="TODO">To Do</option>
              <option ${t.status==='IN_PROGRESS'?'selected':''} value="IN_PROGRESS">In Progress</option>
              <option ${t.status==='DONE'?'selected':''} value="DONE">Done</option>
            </select>
          </div>
          ${isAdmin || t.creatorId === state.user.id ? `
          <div class="form-group">
            <label>Reassign</label>
            <select id="d-assignee">
              <option value="">Unassigned</option>
              ${members.map(m=>`<option ${t.assigneeId===m.userId?'selected':''} value="${m.userId}">${esc(m.user.name)}</option>`).join('')}
            </select>
          </div>
          ` : ''}
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Close</button>
          <button class="btn btn-primary" onclick="updateTaskFromDetail(${t.id}, ${isAdmin || t.creatorId === state.user.id})">Save Changes</button>
        </div>
      ` : `
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        </div>
      `}
    `);
  } catch(e) { toast(e.message, 'error'); }
}

async function updateTaskFromDetail(taskId, canFull) {
  const status = document.getElementById('d-status')?.value;
  const assigneeId = canFull ? document.getElementById('d-assignee')?.value : undefined;
  try {
    await put(`/tasks/${taskId}`, { status, ...(assigneeId !== undefined ? { assigneeId: assigneeId || null } : {}) });
    closeModal();
    toast('Task updated!', 'success');
    if (state.currentProject) navigate('project', state.currentProject.id);
  } catch(e) { toast(e.message, 'error'); }
}

async function openEditTask(taskId) {
  try {
    const t = await get(`/tasks/${taskId}`);
    const p = state.currentProject;
    const members = p ? p.members : [];
    showModal('Edit Task', `
      <div class="form-group"><label>Title *</label><input type="text" id="et-title" value="${esc(t.title)}" /></div>
      <div class="form-group"><label>Description</label><textarea id="et-desc">${esc(t.description || '')}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>Priority</label>
          <select id="et-priority">
            <option ${t.priority==='LOW'?'selected':''} value="LOW">Low</option>
            <option ${t.priority==='MEDIUM'?'selected':''} value="MEDIUM">Medium</option>
            <option ${t.priority==='HIGH'?'selected':''} value="HIGH">High</option>
          </select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="et-status">
            <option ${t.status==='TODO'?'selected':''} value="TODO">To Do</option>
            <option ${t.status==='IN_PROGRESS'?'selected':''} value="IN_PROGRESS">In Progress</option>
            <option ${t.status==='DONE'?'selected':''} value="DONE">Done</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>Assignee</label>
          <select id="et-assignee">
            <option value="">Unassigned</option>
            ${members.map(m=>`<option ${t.assigneeId===m.userId?'selected':''} value="${m.userId}">${esc(m.user.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Due Date</label>
          <input type="date" id="et-due" value="${t.dueDate ? t.dueDate.split('T')[0] : ''}" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditTask(${taskId})">Save</button>
      </div>
    `);
  } catch(e) { toast(e.message, 'error'); }
}

async function saveEditTask(taskId) {
  const title = document.getElementById('et-title').value.trim();
  if (!title) return toast('Title required', 'error');
  try {
    await put(`/tasks/${taskId}`, {
      title,
      description: document.getElementById('et-desc').value.trim(),
      priority: document.getElementById('et-priority').value,
      status: document.getElementById('et-status').value,
      assigneeId: document.getElementById('et-assignee').value || null,
      dueDate: document.getElementById('et-due').value || null
    });
    closeModal();
    toast('Task updated!', 'success');
    if (state.currentProject) navigate('project', state.currentProject.id);
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  try {
    await del(`/tasks/${taskId}`);
    toast('Task deleted', 'success');
    if (state.currentProject) navigate('project', state.currentProject.id);
  } catch(e) { toast(e.message, 'error'); }
}

// ═══════════════════════════════════════════════
// PROJECT EDIT / MEMBERS
// ═══════════════════════════════════════════════
async function openEditProject(projectId) {
  const p = state.currentProject;
  showModal('Edit Project', `
    <div class="form-group"><label>Name *</label><input type="text" id="ep-name" value="${esc(p.name)}" /></div>
    <div class="form-group"><label>Description</label><textarea id="ep-desc">${esc(p.description||'')}</textarea></div>
    <div class="form-group"><label>Status</label>
      <select id="ep-status">
        <option ${p.status==='ACTIVE'?'selected':''} value="ACTIVE">Active</option>
        <option ${p.status==='ARCHIVED'?'selected':''} value="ARCHIVED">Archived</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteProject(${projectId})">Delete Project</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditProject(${projectId})">Save</button>
    </div>
  `);
}

async function saveEditProject(id) {
  try {
    await put(`/projects/${id}`, {
      name: document.getElementById('ep-name').value.trim(),
      description: document.getElementById('ep-desc').value.trim(),
      status: document.getElementById('ep-status').value
    });
    closeModal(); toast('Project updated!', 'success');
    navigate('project', id);
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteProject(id) {
  if (!confirm('Delete this entire project and all its tasks?')) return;
  try {
    await del(`/projects/${id}`);
    closeModal(); toast('Project deleted', 'success');
    navigate('projects');
  } catch(e) { toast(e.message, 'error'); }
}

async function openAddMember(projectId) {
  showModal('Add Member', `
    <div class="form-group">
      <label>Select User</label>
      <select id="m-member-user">
        <option value="">Choose a user...</option>
        ${state.users.map(u=>`<option value="${u.id}">${esc(u.name)} (${esc(u.email)})</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Project Role</label>
      <select id="m-member-role">
        <option value="MEMBER">Member</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addMember(${projectId})">Add Member</button>
    </div>
  `);
}

async function addMember(projectId) {
  const userId = document.getElementById('m-member-user').value;
  const role = document.getElementById('m-member-role').value;
  if (!userId) return toast('Select a user', 'error');
  try {
    await post(`/projects/${projectId}/members`, { userId, role });
    closeModal(); toast('Member added!', 'success');
    navigate('project', projectId);
  } catch(e) { toast(e.message, 'error'); }
}

async function removeMember(projectId, userId, name) {
  if (!confirm(`Remove ${name} from this project?`)) return;
  try {
    await del(`/projects/${projectId}/members/${userId}`);
    toast('Member removed', 'success');
    navigate('project', projectId);
  } catch(e) { toast(e.message, 'error'); }
}

// ═══════════════════════════════════════════════
// MY TASKS
// ═══════════════════════════════════════════════
async function renderMyTasks() {
  const main = document.getElementById('main-content');
  try {
    const tasks = await get(`/tasks?assigneeId=${state.user.id}`);
    const overdue = tasks.filter(t => t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'DONE');
    const inProgress = tasks.filter(t => t.status === 'IN_PROGRESS');
    const todo = tasks.filter(t => t.status === 'TODO');
    const done = tasks.filter(t => t.status === 'DONE');

    main.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">✅ My Tasks</div>
          <div class="page-sub">Tasks assigned to you across all projects</div>
        </div>
      </div>
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
        <div class="stat-card blue"><div class="stat-val">${tasks.length}</div><div class="stat-label">Total</div></div>
        <div class="stat-card yellow"><div class="stat-val">${todo.length}</div><div class="stat-label">To Do</div></div>
        <div class="stat-card orange"><div class="stat-val">${inProgress.length}</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card red"><div class="stat-val">${overdue.length}</div><div class="stat-label">Overdue</div></div>
      </div>

      ${[['⚠️ Overdue', overdue, 'red'], ['🔄 In Progress', inProgress, 'blue'], ['📋 To Do', todo, 'yellow'], ['✅ Done', done, 'green']].map(([label, list, color]) => list.length ? `
        <div class="section-title" style="margin-top:24px">${label}</div>
        <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
          <table class="task-table">
            <thead><tr><th>Task</th><th>Project</th><th>Priority</th><th>Due</th><th>Status</th></tr></thead>
            <tbody>
              ${list.map(t => `
                <tr>
                  <td style="font-weight:500">${esc(t.title)}</td>
                  <td><span class="text-muted">${esc(t.project?.name)}</span></td>
                  <td><span class="priority priority-${t.priority}">${t.priority}</span></td>
                  <td>${t.dueDate ? `<span class="${t.dueDate && new Date(t.dueDate)<new Date()&&t.status!=='DONE'?'text-danger':'text-muted'}">${new Date(t.dueDate).toLocaleDateString()}</span>` : '—'}</td>
                  <td>
                    <select class="filter-select" style="padding:4px 8px" onchange="quickUpdateStatusMy(${t.id},this.value)">
                      <option ${t.status==='TODO'?'selected':''} value="TODO">To Do</option>
                      <option ${t.status==='IN_PROGRESS'?'selected':''} value="IN_PROGRESS">In Progress</option>
                      <option ${t.status==='DONE'?'selected':''} value="DONE">Done</option>
                    </select>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      ` : '').join('')}

      ${tasks.length === 0 ? '<div class="empty"><div class="empty-icon">🎉</div><h3>All clear!</h3><p>No tasks assigned to you right now</p></div>' : ''}
    `;
  } catch(e) { main.innerHTML = `<div class="text-danger">Error: ${e.message}</div>`; }
}

async function quickUpdateStatusMy(taskId, status) {
  try {
    await put(`/tasks/${taskId}`, { status });
    toast('Status updated', 'success');
    renderMyTasks();
  } catch(e) { toast(e.message, 'error'); }
}

// ═══════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════
async function renderAdmin() {
  const main = document.getElementById('main-content');
  if (state.user.role !== 'ADMIN') { main.innerHTML = '<div class="text-danger">Access denied</div>'; return; }
  try {
    const users = await get('/users');
    main.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">🛡️ Admin Panel</div>
          <div class="page-sub">Manage users and system settings</div>
        </div>
      </div>
      <div class="section-title">User Management (${users.length})</div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="task-table">
          <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div class="mini-avatar" style="width:28px;height:28px;font-size:11px">${u.name.charAt(0)}</div>
                    <strong>${esc(u.name)}</strong>
                  </div>
                </td>
                <td class="text-muted">${esc(u.email)}</td>
                <td><span class="badge ${u.role==='ADMIN'?'badge-admin':'badge-member'}">${u.role}</span></td>
                <td class="text-muted">${new Date(u.createdAt).toLocaleDateString()}</td>
                <td>
                  ${u.id !== state.user.id ? `
                    <button class="btn btn-ghost btn-sm" onclick="toggleRole(${u.id},'${u.role}')">
                      ${u.role === 'ADMIN' ? '⬇️ Make Member' : '⬆️ Make Admin'}
                    </button>
                  ` : '<span class="text-muted text-sm">(you)</span>'}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) { main.innerHTML = `<div class="text-danger">Error: ${e.message}</div>`; }
}

async function toggleRole(userId, currentRole) {
  const newRole = currentRole === 'ADMIN' ? 'MEMBER' : 'ADMIN';
  try {
    await put(`/users/${userId}/role`, { role: newRole });
    toast(`User role updated to ${newRole}`, 'success');
    renderAdmin();
  } catch(e) { toast(e.message, 'error'); }
}

// ═══════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════
function showModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ═══════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtStatus(s) { return { TODO: 'To Do', IN_PROGRESS: 'In Progress', DONE: 'Done' }[s] || s; }

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `${type === 'success' ? '✅' : '❌'} ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('login-form') && !document.getElementById('login-form').classList.contains('hidden')) {
    if (document.activeElement?.tagName !== 'BUTTON') login();
  }
});

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
init();
</script>
